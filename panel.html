<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拾光 · 投命</title>
<style>
  :root{
    --ink:#0a0812; --panel:#1a1626; --panel2:#221c30; --track:#2c2638;
    --gold:#d9b772; --gold-bright:#f2d89c; --gold-dim:#7c6a44;
    --cinnabar:#c75543; --jade:#74b394; --violet:#9d8de0;
    --silk:#ece1c9; --silk-dim:#a99e87; --line:rgba(217,183,114,.22);
    --brush:'STKaiti','KaiTi SC','KaiTi','Noto Serif CJK SC','Songti SC',serif;
    --serif:'Songti SC','STSong','Noto Serif CJK SC',serif;
    --sans:'PingFang SC','Noto Sans CJK SC','Heiti SC',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(120% 80% at 50% -10%,#1c1733,transparent 55%),
    radial-gradient(90% 60% at 50% 120%,#1a1228,transparent 50%),var(--ink);
    color:var(--silk);font-family:var(--sans);min-height:100%;display:flex;justify-content:center;
    overflow-x:hidden;-webkit-font-smoothing:antialiased}
  .sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
  .mote{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--gold-bright);opacity:0;
    box-shadow:0 0 6px 1px rgba(242,216,156,.7);animation:rise linear infinite}
  @keyframes rise{0%{transform:translateY(20px) scale(.6);opacity:0}15%{opacity:.7}85%{opacity:.5}
    100%{transform:translateY(-100vh) scale(1);opacity:0}}

  .wrap{position:relative;z-index:1;width:100%;max-width:560px;padding:28px 20px 60px;
    display:flex;flex-direction:column;align-items:center}
  .eyebrow{font-family:var(--serif);letter-spacing:.55em;font-size:11px;color:var(--gold-dim);padding-left:.55em;margin-bottom:6px}
  .title{font-family:var(--brush);font-size:56px;line-height:1;color:var(--gold-bright);text-shadow:0 0 24px rgba(217,183,114,.35);margin-bottom:4px}
  .sub{font-family:var(--serif);font-size:12.5px;color:var(--silk-dim);letter-spacing:.18em}
  .hud{margin-top:12px;display:flex;border:1px solid var(--line);border-radius:3px;overflow:hidden}
  .hud-i{font-family:var(--serif);font-size:11px;letter-spacing:.14em;color:var(--silk-dim);padding:6px 14px;border-left:1px solid var(--line)}
  .hud-i:first-child{border-left:none}
  .hud-i b{color:var(--gold-bright);font-weight:500}
  .hud-i.life b{color:var(--cinnabar);letter-spacing:.05em}

  .view{display:none;width:100%;flex-direction:column;align-items:center}
  .view.active{display:flex;animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  /* compass */
  .stage{margin:26px 0 8px;position:relative;width:240px;height:240px;display:flex;align-items:center;justify-content:center}
  .ring{position:absolute;border-radius:50%;border:1px solid var(--line)}
  .ring.r1{inset:0;border-color:rgba(217,183,114,.30)}
  .ring.r2{inset:18px;border-style:dashed;border-color:rgba(157,141,224,.28)}
  .ring.r3{inset:40px;border-color:rgba(217,183,114,.16)}
  .glyphs{position:absolute;inset:0;animation:spin 60s linear infinite}
  .glyphs span{position:absolute;top:50%;left:50%;font-family:var(--serif);font-size:13px;color:var(--gold-dim);transform-origin:0 0}
  .glow{position:absolute;inset:30px;border-radius:50%;background:radial-gradient(circle,rgba(157,141,224,.18),transparent 70%);filter:blur(4px);animation:breathe 4.5s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.5;transform:scale(.96)}50%{opacity:1;transform:scale(1.04)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .core{position:relative;z-index:2;width:146px;height:146px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;border:1px solid var(--gold);color:var(--gold-bright);background:radial-gradient(circle at 50% 38%,#2a2238,#14101e);
    box-shadow:0 0 0 6px rgba(10,8,18,.6),0 0 34px rgba(217,183,114,.25),inset 0 0 28px rgba(0,0,0,.6);transition:transform .25s,box-shadow .3s;user-select:none}
  .core:hover{transform:scale(1.04);box-shadow:0 0 0 6px rgba(10,8,18,.6),0 0 48px rgba(217,183,114,.45),inset 0 0 28px rgba(0,0,0,.6)}
  .core:active{transform:scale(.97)}
  .core .cmd{font-family:var(--brush);font-size:44px;line-height:1}
  .core .hint{font-family:var(--serif);font-size:10.5px;letter-spacing:.3em;color:var(--silk-dim);margin-top:4px}
  .core.rolling .cmd{font-family:var(--serif);font-size:20px;padding:0 8px;text-align:center;animation:flick .08s linear infinite alternate}
  @keyframes flick{from{opacity:.6}to{opacity:1}}
  .stage.spinning .glyphs{animation:spin 1.1s linear infinite}
  .stage.spinning .r2{animation:spin 2s linear infinite reverse}

  .card{width:100%;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:5px;padding:20px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .result{width:100%;margin-top:14px;opacity:0;transform:translateY(14px);transition:opacity .5s,transform .5s;pointer-events:none}
  .result.show{opacity:1;transform:translateY(0);pointer-events:auto}
  .card::before{content:"";display:block;height:2px;width:46px;margin:0 auto 16px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .wtag{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .wtype{font-family:var(--serif);font-size:11px;letter-spacing:.32em;color:var(--gold-dim)}
  .diff{font-family:var(--serif);font-size:11px;letter-spacing:.15em;padding:3px 11px;border-radius:2px;border:1px solid currentColor}
  .diff.甜{color:var(--jade)}.diff.正{color:var(--gold)}.diff.狱{color:var(--cinnabar)}
  .wname{font-family:var(--serif);font-weight:900;font-size:28px;color:var(--silk);text-align:center;letter-spacing:.06em;margin:2px 0 16px}
  .row{display:flex;gap:12px;padding:10px 0;border-top:1px solid rgba(217,183,114,.12)}
  .k{flex:0 0 50px;font-family:var(--serif);font-size:12.5px;color:var(--gold);letter-spacing:.1em;padding-top:1px}
  .v{flex:1;font-size:13.5px;line-height:1.7;color:var(--silk);font-weight:300}
  .v .name{color:var(--gold-bright);font-weight:500}

  .profile{margin:14px 0;padding:15px 15px 13px;border:1px solid rgba(217,183,114,.2);border-radius:3px;background:rgba(10,8,18,.4);position:relative}
  .profile::after{content:"攻略对象";position:absolute;top:-9px;left:14px;padding:0 8px;background:var(--panel);font-family:var(--serif);font-size:10.5px;letter-spacing:.3em;color:var(--gold-dim)}
  .phead{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
  .phead .tn{font-family:var(--serif);font-weight:700;font-size:20px;color:var(--gold-bright)}
  .phead .tt{font-family:var(--serif);font-size:12px;color:var(--silk-dim);letter-spacing:.12em}
  .pr{display:flex;gap:10px;align-items:baseline;margin-bottom:7px}
  .pk{flex:0 0 32px;font-family:var(--serif);font-size:11.5px;color:var(--gold)}
  .pv{flex:1;font-size:12.5px;line-height:1.65;color:var(--silk);font-weight:300}
  .pline{margin-top:6px;padding-top:11px;border-top:1px dashed rgba(217,183,114,.18);font-family:var(--serif);font-size:13px;color:var(--silk-dim);font-style:italic}

  .opening{margin-top:14px;padding:15px 15px 4px;border:1px solid rgba(217,183,114,.14);border-radius:3px;background:rgba(10,8,18,.45)}
  .opening .lbl{font-family:var(--serif);font-size:11px;letter-spacing:.3em;color:var(--gold-dim);margin-bottom:8px}
  .opening p{font-size:13px;line-height:1.9;color:var(--silk-dim);font-weight:300;margin-bottom:10px;text-indent:2em}
  .opening p.last{color:var(--silk)}

  .hud-i.pavilion{cursor:pointer;color:var(--gold-dim);transition:.2s}
  .hud-i.pavilion:hover,.hud-i.pavilion:active{color:var(--gold-bright)}
  .arclist{display:flex;flex-direction:column;gap:12px;margin-top:6px}
  .arc-card{position:relative;border:1px solid var(--line);border-radius:6px;padding:14px 15px;background:linear-gradient(160deg,rgba(40,32,60,.55),rgba(22,18,34,.7));cursor:pointer;transition:.2s;overflow:hidden}
  .arc-card:hover,.arc-card:active{border-color:var(--gold-dim);transform:translateY(-1px)}
  .arc-card .ac-no{position:absolute;top:10px;right:12px;font-family:var(--serif);font-size:11px;letter-spacing:.2em;color:var(--gold-dim)}
  .arc-card .ac-name{font-family:var(--serif);font-size:17px;color:var(--gold-bright);letter-spacing:.06em;margin-bottom:3px}
  .arc-card .ac-type{font-size:11px;color:var(--silk-dim);letter-spacing:.14em;margin-bottom:9px}
  .arc-card .ac-tg{font-size:12.5px;color:var(--silk);margin-bottom:8px}
  .arc-card .ac-tg b{color:var(--gold-bright);font-weight:500}
  .arc-card .ac-meta{display:flex;gap:14px;font-size:11px;color:var(--silk-dim);letter-spacing:.06em}
  .arc-card .ac-meta em{color:var(--gold-dim);font-style:normal}
  .arc-card .ac-acts{display:flex;gap:10px;margin-top:12px}
  .arc-card .ac-go{flex:1;text-align:center;font-family:var(--serif);font-size:13px;letter-spacing:.1em;color:#1a1206;background:linear-gradient(180deg,var(--gold-bright),var(--gold-dim));padding:9px;border-radius:4px;cursor:pointer;font-weight:600}
  .arc-card .ac-go:active{opacity:.85}
  .arc-card .ac-del{font-size:12px;color:var(--silk-dim);padding:9px 14px;border:1px solid var(--line);border-radius:4px;letter-spacing:.1em;cursor:pointer}
  .arc-card .ac-del:hover,.arc-card .ac-del:active{color:var(--cinnabar);border-color:var(--cinnabar)}
  .arc-empty{text-align:center;color:var(--silk-dim);font-size:13px;letter-spacing:.1em;padding:40px 10px;line-height:2}
  .actions{display:flex;gap:10px;margin-top:16px;width:100%}
  .btn{flex:1;padding:13px 10px;border-radius:3px;cursor:pointer;font-family:var(--serif);font-size:14px;letter-spacing:.12em;transition:.2s;text-align:center;user-select:none}
  .btn.ghost{background:transparent;border:1px solid var(--gold-dim);color:var(--gold)}
  .btn.ghost:hover{border-color:var(--gold);color:var(--gold-bright);background:rgba(217,183,114,.06)}
  .btn.solid{background:linear-gradient(180deg,#3a2f1c,#241c10);border:1px solid var(--gold);color:var(--gold-bright)}
  .btn.solid:hover{box-shadow:0 0 22px rgba(217,183,114,.3)}
  .btn.disabled{opacity:.4;pointer-events:none}

  /* ===== in-world ===== */
  .banner{width:100%;padding:18px;border:1px solid var(--line);border-radius:5px;background:linear-gradient(160deg,#26203a,#13101c);box-shadow:0 14px 40px rgba(0,0,0,.5);text-align:center;margin-bottom:14px}
  .banner .be{font-family:var(--serif);font-size:11px;letter-spacing:.4em;color:var(--gold-dim);margin-bottom:8px}
  .banner hr{border:none;height:1px;width:40px;margin:0 auto 12px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .banner .bn{font-family:var(--serif);font-weight:900;font-size:23px;color:var(--gold-bright);letter-spacing:.06em;margin-bottom:6px}
  .banner .bd{display:inline-block;font-family:var(--serif);font-size:11px;letter-spacing:.15em;color:var(--gold);border:1px solid rgba(217,183,114,.4);border-radius:2px;padding:2px 12px;margin-bottom:12px}
  .banner .bi{font-size:12.5px;line-height:1.9;color:var(--silk-dim)}
  .banner .bi b{color:var(--gold)}

  .acc{width:100%;border:1px solid var(--line);border-radius:5px;background:linear-gradient(180deg,var(--panel2),var(--panel));margin-bottom:11px;overflow:hidden}
  .acc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;user-select:none}
  .acc-head .at{font-family:var(--serif);font-size:14px;letter-spacing:.18em;color:var(--gold-bright)}
  .acc-head .ac{font-size:12px;color:var(--gold-dim);transition:transform .3s}
  .acc.open .acc-head .ac{transform:rotate(90deg);color:var(--gold)}
  .acc-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .4s ease;padding:0 16px}
  .acc.open .acc-body{max-height:1600px;padding:0 16px 16px}

  .aff{display:flex;align-items:center;gap:10px;margin:4px 0 14px}
  .aff span.al{font-family:var(--serif);font-size:12px;color:var(--gold);flex:0 0 32px}
  .aff .bar{flex:1;height:9px;border-radius:5px;background:var(--track);overflow:hidden;border:1px solid rgba(217,183,114,.18)}
  .aff .bar i{display:block;height:100%;background:linear-gradient(90deg,#b06a4f,#f2d89c);transition:width .6s ease}
  .aff span.an{font-family:var(--serif);font-size:12px;color:var(--gold-bright)}
  .aff span.an em{color:var(--silk-dim);font-style:normal}
  .blk{margin-bottom:13px}
  .blk .bl{font-family:var(--serif);font-size:11px;letter-spacing:.2em;color:var(--gold-dim);margin-bottom:5px}
  .voice{font-size:13px;line-height:1.7;color:#c9bfa8;font-style:italic;padding-left:11px;border-left:2px solid rgba(217,183,114,.35)}
  .todo{font-size:13px;line-height:2;color:var(--silk);white-space:pre-line}

  .shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px}
  .sitem{border:1px solid rgba(217,183,114,.18);border-radius:4px;padding:10px 11px;background:rgba(10,8,18,.4);cursor:pointer;transition:.18s;position:relative}
  .sitem:hover{border-color:rgba(217,183,114,.45)}
  .sitem.sel{border-color:var(--gold-bright);background:rgba(217,183,114,.1);box-shadow:0 0 14px rgba(217,183,114,.18)}
  .sitem.sel::after{content:"✓";position:absolute;top:7px;right:9px;color:var(--gold-bright);font-size:12px}
  .sitem .sn{font-size:13px;color:var(--silk)}
  .sitem .sc{font-size:12px;color:var(--gold);margin-top:4px}
  .shop-bar{display:flex;align-items:center;justify-content:space-between;border-top:1px dashed rgba(217,183,114,.2);padding-top:11px}
  .shop-bar .tot{font-family:var(--serif);font-size:12.5px;color:var(--silk-dim)}
  .shop-bar .tot b{color:var(--gold-bright)}
  .buy{padding:9px 18px;border-radius:3px;font-family:var(--serif);font-size:13px;letter-spacing:.1em;cursor:pointer;
    background:linear-gradient(180deg,#3a2f1c,#241c10);border:1px solid var(--gold);color:var(--gold-bright);transition:.2s;user-select:none}
  .buy:hover{box-shadow:0 0 18px rgba(217,183,114,.3)}
  .buy.off{opacity:.4;pointer-events:none}
  .bag{margin-top:12px;font-size:11.5px;color:var(--silk-dim);font-family:var(--serif)}
  .bag b{color:var(--gold-dim);letter-spacing:.2em}
  .chip{display:inline-block;font-family:var(--sans);font-size:11px;color:var(--gold);border:1px solid rgba(217,183,114,.3);border-radius:10px;padding:1px 9px;margin:3px 4px 0 0}

  .toast{position:fixed;top:18px;left:50%;transform:translate(-50%,-16px);z-index:9;background:linear-gradient(180deg,#2a2238,#16121f);
    border:1px solid var(--gold);color:var(--gold-bright);font-family:var(--serif);font-size:12.5px;letter-spacing:.04em;padding:9px 18px;border-radius:3px;
    box-shadow:0 8px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.45s;max-width:90vw;text-align:center}
  .toast.show{opacity:1;transform:translate(-50%,0)}
  .foot{margin-top:24px;font-family:var(--serif);font-size:10.5px;letter-spacing:.25em;color:var(--gold-dim);opacity:.6;text-align:center}

  @media (max-width:430px){.title{font-size:48px}.stage{width:210px;height:210px}.core{width:130px;height:130px}.wname{font-size:25px}.shop-grid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){.glyphs,.glow,.stage.spinning .glyphs,.stage.spinning .r2,.mote{animation:none!important}}
</style>
</head>
<body>
<div class="sky" id="sky"></div>
<div class="toast" id="toast"></div>

<main class="wrap">
  <div class="eyebrow">拾光 · 主神系统</div>
  <div class="title">投命</div>
  <div class="sub" id="sub">点击命盘，掷入无尽之境</div>
  <div class="hud">
    <span class="hud-i">轮回 <b id="hWorld">— 世</b></span>
    <span class="hud-i">积分 <b id="hScore">100</b></span>
    <span class="hud-i life">寿元 <b id="hLife">♥♥♥</b></span>
    <span class="hud-i pavilion" onclick="openArchive()">轮回阁 <b id="hSaved">0</b> ▸</span>
  </div>

  <!-- ===== 投命视图 ===== -->
  <section class="view active" id="viewRoll">
    <div class="stage" id="stage">
      <div class="glow"></div><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div>
      <div class="glyphs" id="glyphs"></div>
      <div class="core" id="core" role="button" tabindex="0" aria-label="投命" onclick="roll()">
        <div class="cmd" id="cmd">投</div><div class="hint" id="hint">掷 命</div>
      </div>
    </div>

    <div class="result" id="result">
      <div class="card">
        <div class="wtag"><span class="wtype" id="wtype"></span><span class="diff" id="diff"></span></div>
        <h2 class="wname" id="wname"></h2>
        <div class="row"><div class="k">身份</div><div class="v" id="identity"></div></div>
        <div class="profile">
          <div class="phead"><span class="tn" id="tName"></span><span class="tt" id="tTitle"></span></div>
          <div class="pr"><span class="pk">外貌</span><span class="pv" id="tLook"></span></div>
          <div class="pr"><span class="pk">性格</span><span class="pv" id="tVibe"></span></div>
          <div class="pr"><span class="pk">说话</span><span class="pv" id="tTalk"></span></div>
          <div class="pr"><span class="pk">着装</span><span class="pv" id="tWear"></span></div>
          <div class="pline" id="tLine"></div>
        </div>
        <div class="row"><div class="k">主线</div><div class="v" id="mainline"></div></div>
        <div class="row"><div class="k">死局</div><div class="v" id="death"></div></div>
        <div class="opening"><div class="lbl">开 场</div><div id="opening"></div></div>
      </div>
      <div class="actions">
        <div class="btn ghost" id="reroll" onclick="roll()">换一个</div>
        <div class="btn solid" id="enter" onclick="enterWorld()">确认进入此世 ▸</div>
        <div class="btn solid" id="rollInfinite" onclick="roll()">🎲 无限流 · 再投一个未知之世</div>
      </div>
    </div>
  </section>

  <!-- ===== 入世视图 ===== -->
  <section class="view" id="viewWorld">
    <div class="banner">
      <div class="be">投 命 · 入 世</div><hr>
      <div class="bn" id="bName"></div>
      <div class="bd" id="bDiff"></div>
      <div class="bi" id="bInfo"></div>
    </div>

    <div class="acc open" id="accProfile">
      <div class="acc-head"><span class="at">攻略对象 · 档案</span><span class="ac">▸</span></div>
      <div class="acc-body" id="wProfile"></div>
    </div>

    <div class="acc open" id="accStatus">
      <div class="acc-head"><span class="at">本世状态</span><span class="ac">▸</span></div>
      <div class="acc-body">
        <div class="aff"><span class="al">好感</span><div class="bar"><i id="affBar"></i></div><span class="an"><b id="affNum">0</b><em>/100</em></span></div>
        <div class="blk"><div class="bl">心声</div><div class="voice" id="wVoice"></div></div>
        <div class="blk"><div class="bl">待办</div><div class="todo" id="wTodo"></div></div>
      </div>
    </div>

    <div class="acc" id="accShop">
      <div class="acc-head"><span class="at">主神商城</span><span class="ac">▸</span></div>
      <div class="acc-body">
        <div class="shop-grid" id="shopGrid"></div>
        <div class="shop-bar">
          <span class="tot">已选 <b id="shopTot">0</b> 积分</span>
          <span class="buy off" id="buyBtn" onclick="buy()">确认兑换</span>
        </div>
        <div class="bag"><b>背包</b>　<span id="bag">空空如也</span></div>
      </div>
    </div>

    <div class="actions">
      <div class="btn ghost" id="askAI" onclick="pushWorldToAI()">▶ 让 AI 开场</div>
      <div class="btn solid" id="nextLife" onclick="nextLife()">投命 · 下一世 ▸</div>
    </div>
  </section>

  <!-- ===== 轮回阁视图 ===== -->
  <section class="view" id="viewArchive">
    <div class="banner">
      <div class="be">轮 回 阁</div><hr>
      <div class="bn" style="font-size:19px">已历诸世 · 随时归返</div>
      <div class="bi" id="arcInfo">此处封存你走过的每一世，点开即可回到那一世继续。</div>
    </div>
    <div id="arcList" class="arclist"></div>
    <div class="actions">
      <div class="btn ghost" onclick="switchView('roll')">◂ 返回投命</div>
    </div>
  </section>

  <div class="foot">命由天定 · 路由你走 · 轮回不息</div>
</main>

<script>
const WORLDS = [

// ===== 与父级 SillyTavern 扩展通信 =====
const BRIDGE_SOURCE = 'shiguang-cast-fate';
const pendingRequests = new Map();

function sendToExtension(type, payload={}){
  const requestId = `${Date.now()}-${Math.random().toString(36).slice(2)}`;
  window.parent.postMessage({source:BRIDGE_SOURCE,type,requestId,...payload}, location.origin);
  return new Promise(resolve=>{
    const timer=setTimeout(()=>{
      pendingRequests.delete(requestId);
      resolve({ok:false,message:'云酒馆没有回应，请确认扩展已启用'});
    },10000);
    pendingRequests.set(requestId,{resolve,timer});
  });
}

window.addEventListener('message',event=>{
  if(event.origin!==location.origin) return;
  const data=event.data;
  if(!data||data.source!==BRIDGE_SOURCE||data.type!=='enter-world-result') return;
  const pending=pendingRequests.get(data.requestId);
  if(!pending) return;
  clearTimeout(pending.timer);
  pendingRequests.delete(data.requestId);
  pending.resolve(data);
});

// 命盘符纹 / 星点
(function(){const g=byId('glyphs'),m="乾兑离震巽坎艮坤命劫缘",R=100,n=m.length;
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2,s=document.createElement('span');s.textContent=m[i];
    s.style.transform=`translate(${Math.cos(a)*R}px,${Math.sin(a)*R}px) rotate(${a+Math.PI/2}rad)`;g.appendChild(s);}})();
(function(){const sky=byId('sky');for(let i=0;i<24;i++){const m=document.createElement('div');m.className='mote';
  m.style.left=Math.random()*100+'%';m.style.bottom=(-10-Math.random()*20)+'%';
  m.style.animationDuration=(9+Math.random()*12)+'s';m.style.animationDelay=(-Math.random()*15)+'s';
  m.style.transform=`scale(${.5+Math.random()*1.2})`;sky.appendChild(m);}})();

function roll(){
  if(rolling) return; rolling=true;
  result.classList.remove('show');
  core.classList.add('rolling'); stage.classList.add('spinning'); hint.style.opacity=0;
  const start=performance.now(),dur=1500;let last=0;
  (function frame(now){const e=now-start,iv=60+e/dur*120;
    if(now-last>iv){cmd.textContent=pick(WORLDS).name;last=now;}
    if(e<dur)requestAnimationFrame(frame);else settle();})(start);
}
function settle(){
  const w=genWorld(),tg=w.targets[0]; current={w,tg}; resumingId=null; renderPreview(w,tg);
  stage.classList.remove('spinning'); core.classList.remove('rolling');
  cmd.textContent="换"; hint.textContent="再 投 一 个"; hint.style.opacity=1; rolling=false;
  result.classList.add('show'); result.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function renderPreview(w,tg){
  const dk=w.diff[0];
  byId('wtype').textContent=w.type;
  const d=byId('diff'); d.textContent="难度 · "+DIFF_LABEL[dk]; d.className="diff "+dk;
  byId('wname').textContent="《"+w.name+"》";
  byId('identity').innerHTML=w.identity;
  byId('tName').textContent=tg.n; byId('tTitle').textContent="· "+tg.t;
  byId('tLook').textContent=tg.look; byId('tVibe').textContent=tg.vibe;
  byId('tTalk').textContent=tg.talk; byId('tWear').textContent=tg.wear; byId('tLine').textContent=tg.line;
  byId('mainline').textContent=w.mainline; byId('death').textContent=w.death;
  const lines=w.open(tg);
  byId('opening').innerHTML=lines.map((l,i)=>`<p class="${i===lines.length-1?'last':''}">${l}</p>`).join('');
}

// 入世
function enterWorld(){
  if(!current) return;
  worldNo++; aff=6+Math.floor(Math.random()*18); selected.clear();
  // 存进轮回阁
  const {w,tg}=current;
  const rec={id:'L'+Date.now(), no:worldNo, savedAt:Date.now(),
    type:w.type, name:w.name, diff:w.diff, identity:w.identity, mainline:w.mainline,
    death:w.death, todo:w.todo, tg:tg, aff:aff, bag:bag.slice(), cleared:false};
  SAVES.unshift(rec); resumingId=rec.id;
  if(SAVES.length>40) SAVES.length=40;
  persist();
  renderWorld(); updateHUD(); switchView('world');
  pushWorldToAI();
}
// 续玩某一世
function resumeLife(id){
  const r=SAVES.find(x=>x.id===id); if(!r) return;
  const w={type:r.type,name:r.name,diff:r.diff,identity:r.identity,mainline:r.mainline,death:r.death,todo:r.todo,targets:[r.tg]};
  current={w,tg:r.tg}; resumingId=id; aff=r.aff||10; bag=r.bag?r.bag.slice():bag; selected.clear();
  renderWorld(); updateHUD(); switchView('world');
  toast('已归返《'+r.name+'》· 接着玩');
}
function deleteLife(id,e){
  if(e){e.stopPropagation();}
  SAVES=SAVES.filter(x=>x.id!==id); persist(); renderArchive(); updateHUD();
  toast('已从轮回阁抹去此世');
}
function openArchive(){ renderArchive(); switchView('archive'); }
function renderArchive(){
  const box=byId('arcList');
  if(!SAVES.length){ box.innerHTML='<div class="arc-empty">轮回阁尚空。<br>掷一次命，确认进入某一世，<br>那一世便会封存于此。</div>'; return; }
  box.innerHTML=SAVES.map(r=>{
    const dl=DIFF_LABEL[r.diff[0]]||r.diff[1]||'';
    return `<div class="arc-card">
      <div class="ac-no">第 ${han(r.no)} 世</div>
      <div class="ac-name">《${r.name}》</div>
      <div class="ac-type">${r.type} · 难度${dl}</div>
      <div class="ac-tg">攻略 <b>${r.tg.n}</b> · ${r.tg.t}</div>
      <div class="ac-meta"><span>好感 <em>${r.aff||0}/100</em></span><span>${r.cleared?'已通关':'进行中'}</span></div>
      <div class="ac-acts">
        <span class="ac-go" onclick="resumeLife('${r.id}')">▸ 回到此世</span>
        <span class="ac-del" onclick="deleteLife('${r.id}',event)">移除</span>
      </div>
    </div>`;
  }).join('');
}
function renderWorld(){
  const {w,tg}=current, dk=w.diff[0];
  byId('bName').textContent="《"+w.name+"》· "+w.type;
  const bd=byId('bDiff'); bd.textContent="难度 · "+DIFF_LABEL[dk]; bd.className="bd "+dk;
  byId('bInfo').innerHTML=`身份　${w.identity.replace(/<[^>]+>/g,'')}<br>攻略　<b>${tg.n}</b> · ${tg.t}`;
  byId('wProfile').innerHTML=
    `<div class="pr"><span class="pk">外貌</span><span class="pv">${tg.look}</span></div>`+
    `<div class="pr"><span class="pk">性格</span><span class="pv">${tg.vibe}</span></div>`+
    `<div class="pr"><span class="pk">说话</span><span class="pv">${tg.talk}</span></div>`+
    `<div class="pr"><span class="pk">着装</span><span class="pv">${tg.wear}</span></div>`+
    `<div class="pline">${tg.line}</div>`;
  byId('affBar').style.width=aff+'%'; byId('affNum').textContent=aff;
  byId('wVoice').textContent=tg.voice;
  byId('wTodo').textContent=w.todo.map(x=>"◦ "+x).join("\n");
  renderShop();
}
function renderShop(){
  byId('shopGrid').innerHTML=SHOP.map((s,i)=>
    `<div class="sitem${selected.has(i)?' sel':''}" data-i="${i}" onclick="toggleShop(${i},this)"><div class="sn">${s.k}</div><div class="sc">${s.c} 积分</div></div>`).join('');
  byId('shopGrid').querySelectorAll('.sitem').forEach(el=>el.onclick=()=>{
    const i=+el.dataset.i; selected.has(i)?selected.delete(i):selected.add(i); refreshShopBar(); el.classList.toggle('sel');
  });
  refreshShopBar(); renderBag();
}
function toggleShop(i,el){selected.has(i)?selected.delete(i):selected.add(i);if(el)el.classList.toggle("sel");refreshShopBar();}
function shopTotal(){let t=0;selected.forEach(i=>t+=SHOP[i].c);return t;}
function refreshShopBar(){
  const t=shopTotal(); byId('shopTot').textContent=t;
  byId('buyBtn').classList.toggle('off', t===0);
}
function renderBag(){
  byId('bag').innerHTML = bag.length ? bag.map(x=>`<span class="chip">${x}</span>`).join('') : "空空如也";
}
function buy(){
  const t=shopTotal(); if(t===0) return;
  if(score<t){ toast("积分不足 · 还差 "+(t-score)); return; }
  score-=t; const names=[]; selected.forEach(i=>{bag.push(SHOP[i].k.split(" · ")[0]);names.push(SHOP[i].k.split(" · ")[0]);});
  selected.clear(); updateHUD(); renderShop(); persist();
  toast("已兑换 "+names.join("、")+" · 余额 "+score);
}
function settleWorld(w){
  const dk=w.diff[0], gain=({甜:80,正:120,狱:200}[dk])+Math.floor(Math.random()*80);
  score+=gain; let msg=`通关《${w.name}》 +${gain} 积分`;
  if(dk==='狱'&&Math.random()<0.45){life-=1;msg+=` · 回溯1次 · 寿元 -1`;}
  else if(Math.random()<0.25){life+=1;msg+=` · 全身而退 · 寿元 +1`;}
  if(life<=0){life=3;msg+=` · 寿元耗尽，主神补满 ♥♥♥`;}
  return msg;
}
function nextLife(){
  if(current){
    // 把本世进度写回轮回阁存档
    if(resumingId){const r=SAVES.find(x=>x.id===resumingId); if(r){r.aff=aff;r.bag=bag.slice();r.cleared=true;}}
    const msg=settleWorld(current.w);updateHUD();persist();toast("结算 · "+msg);
  }
  current=null; resumingId=null; switchView('roll'); result.classList.remove('show');
  cmd.textContent="投"; hint.textContent="掷 命"; hint.style.opacity=1;
  setTimeout(roll,560);
}

// 折叠
document.querySelectorAll('.acc-head').forEach(h=>h.onclick=()=>h.parentElement.classList.toggle('open'));
// 事件
core.onclick=roll;
core.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();roll();}});
byId('reroll').onclick=roll;
byId('enter').onclick=enterWorld;
byId('nextLife').onclick=nextLife;
byId('buyBtn').onclick=buy;
byId('askAI').onclick=pushWorldToAI;
function fb(txt,done){const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');done&&done();}catch(e){}document.body.removeChild(ta);}

updateHUD();
</script>
</body>
</html>
